services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: backup_monitor_app
    working_dir: /var/www/html
    command: php artisan serve --host=0.0.0.0 --port=8000
    volumes:
      - ./app:/var/www/html
    env_file:
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: backup_monitor_worker
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --timeout=120
    volumes:
      - ./app:/var/www/html
    env_file:
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: backup_monitor_scheduler
    working_dir: /var/www/html
    command: ["sh", "-c", "while true; do php artisan schedule:run; sleep 60; done"]
    volumes:
      - ./app:/var/www/html
    env_file:
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: backup_monitor_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: backup_monitor
      MYSQL_USER: backup
      MYSQL_PASSWORD: backup
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: backup_monitor_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  mysql_data:
