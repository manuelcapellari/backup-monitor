services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: backup_monitor_app_prod
    working_dir: /var/www/html
    command: php artisan serve --host=0.0.0.0 --port=8000
    volumes:
      - ./app:/var/www/html
    env_file:
      - .env.prod
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: always

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: backup_monitor_worker_prod
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --timeout=120 --sleep=2
    volumes:
      - ./app:/var/www/html
    env_file:
      - .env.prod
    depends_on:
      mysql:
        condition: service_healthy
    restart: always

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: backup_monitor_scheduler_prod
    working_dir: /var/www/html
    command: ["sh", "-c", "while true; do php artisan schedule:run; sleep 60; done"]
    volumes:
      - ./app:/var/www/html
    env_file:
      - .env.prod
    depends_on:
      mysql:
        condition: service_healthy
    restart: always

  mysql:
    image: mysql:8.4
    container_name: backup_monitor_mysql_prod
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-backup_monitor}
      MYSQL_USER: ${MYSQL_USER:-backup}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me}
    volumes:
      - mysql_data_prod:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-change_me}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

volumes:
  mysql_data_prod:
